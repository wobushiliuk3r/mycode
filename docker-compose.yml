services:
  gateway:
    build: .
    restart: unless-stopped
    environment:
      - GATEWAY_KEY=${GATEWAY_KEY}
      - TARGET_BASE_URL=${TARGET_BASE_URL:-https://api.openai.com}
      - PORT=3000
    volumes:
      - ./data:/data
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - gateway
